<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>文字数・行数カウント</title><link rel="stylesheet" href="../../assets/vendor/bootstrap.min.css"><link rel="stylesheet" href="../../assets/css/common.css"></head><body><header class="app-header"><div class="container"><h1>文字数・行数カウント</h1><p>文章の文字数、行数、空白除外数などを確認します。</p></div></header><main class="container py-4"><p><a href="../../index.html">← ツール一覧へ戻る</a></p><section class="panel"><textarea class="form-control" id="text" rows="10"></textarea></section><div class="stat-grid" id="stats"></div></main><script>const text=document.getElementById("text"),stats=document.getElementById("stats");function wide(ch){return ch.codePointAt(0)>0xFF}function render(){const s=text.value;const chars=Array.from(s);const lines=s.length?s.split(/\r\n|\n|\r/).length:0;const noSpace=chars.filter(c=>!/\s/.test(c)).length;const full=chars.filter(wide).length;const half=chars.length-full;stats.innerHTML=[["文字数",chars.length],["空白除外",noSpace],["行数",lines],["改行数",(s.match(/\r\n|\n|\r/g)||[]).length],["全角概算",full],["半角概算",half]].map(([k,v])=>`<div class="stat"><span>${k}</span><strong>${v}</strong></div>`).join("")}text.addEventListener("input",render);render()</script></body></html>
