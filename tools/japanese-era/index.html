<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>和暦・西暦変換</title><link rel="stylesheet" href="../../assets/vendor/bootstrap.min.css"><link rel="stylesheet" href="../../assets/css/common.css"></head><body><header class="app-header"><div class="container"><h1>和暦・西暦変換</h1><p>明治以降の日付を変換します。</p></div></header><main class="container py-4"><p><a href="../../index.html">← ツール一覧へ戻る</a></p><section class="panel"><div class="row"><div class="col-md-6 mb-3"><label class="form-label" for="date">西暦日付</label><input class="form-control" type="date" id="date"></div><div class="col-md-6 mb-3"><label class="form-label" for="wareki">和暦入力 例: 令和1年5月1日</label><input class="form-control" id="wareki"></div></div><button class="btn btn-primary" id="convert">変換</button></section><div class="alert alert-info" id="out"></div></main><script>const eras=[["令和","R","2019-05-01"],["平成","H","1989-01-08"],["昭和","S","1926-12-25"],["大正","T","1912-07-30"],["明治","M","1868-01-25"]].map(e=>({...{name:e[0],abbr:e[1]},start:new Date(e[2]+"T00:00:00")}));function fmtEra(d){const e=eras.find(x=>d>=x.start);if(!e)return"対象外";const y=d.getFullYear()-e.start.getFullYear()+1;return`${e.name}${y===1?"元":y}年${d.getMonth()+1}月${d.getDate()}日` }function parseWareki(s){const m=s.match(/(令和|平成|昭和|大正|明治|R|H|S|T|M)\s*(元|\d+)\s*年\s*(\d+)\s*月\s*(\d+)\s*日?/i);if(!m)return null;const e=eras.find(x=>x.name===m[1]||x.abbr.toLowerCase()===m[1].toLowerCase());const y=(m[2]==="元"?1:Number(m[2]))+e.start.getFullYear()-1;return new Date(y,Number(m[3])-1,Number(m[4]))}document.getElementById("convert").onclick=()=>{const outs=[];const dval=document.getElementById("date").value;if(dval){const d=new Date(dval+"T00:00:00");outs.push(`${dval} = ${fmtEra(d)}`)}const w=document.getElementById("wareki").value.trim();if(w){const d=parseWareki(w);outs.push(d?`${w} = ${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`:"和暦入力を解釈できませんでした。")}document.getElementById("out").innerHTML=outs.join("<br>")||"日付を入力してください。"};</script></body></html>
