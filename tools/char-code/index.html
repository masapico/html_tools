<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>文字コード確認</title><link rel="stylesheet" href="../../assets/vendor/bootstrap.min.css"><link rel="stylesheet" href="../../assets/css/common.css"></head><body><header class="app-header"><div class="container"><h1>文字コード確認</h1><p>入力文字のUnicodeコードポイントなどを表示します。</p></div></header><main class="container py-4"><p><a href="../../index.html">← ツール一覧へ戻る</a></p><section class="panel"><label class="form-label" for="text">文字列</label><textarea class="form-control" id="text" rows="5"></textarea></section><div class="table-wrap"><table class="table table-sm"><thead><tr><th>文字</th><th>コードポイント</th><th>10進</th><th>UTF-16</th><th>判定</th></tr></thead><tbody id="out"></tbody></table></div></main><script>const t=document.getElementById("text"),o=document.getElementById("out");function cls(cp){if((cp>=0xE000&&cp<=0xF8FF)||(cp>=0xF0000&&cp<=0xFFFFD)||(cp>=0x100000&&cp<=0x10FFFD))return"私用領域";if(cp>=0xFE00&&cp<=0xFE0F)return"異体字セレクタ";if(cp>=0x300&&cp<=0x36F)return"結合文字";return""}function render(){o.innerHTML=Array.from(t.value).map(ch=>{const cp=ch.codePointAt(0);const units=[];for(let i=0;i<ch.length;i++)units.push("0x"+ch.charCodeAt(i).toString(16).toUpperCase().padStart(4,"0"));return`<tr><td class="mono">${ch===" "?"(空白)":ch}</td><td class="mono">U+${cp.toString(16).toUpperCase().padStart(4,"0")}</td><td>${cp}</td><td class="mono">${units.join(" ")}</td><td>${cls(cp)}</td></tr>`}).join("")}t.addEventListener("input",render);render()</script></body></html>
