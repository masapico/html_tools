<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV編集ツール</title>
  <link rel="stylesheet" href="../../assets/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="../../assets/css/common.css">
</head>
<body>
  <header class="app-header"><div class="container"><h1>CSV編集ツール</h1><p>CSVを表形式で確認し、セル単位の軽編集を行います。ファイルはブラウザ内だけで処理します。</p></div></header>
  <main class="container py-4">
    <p><a href="../../index.html">← ツール一覧へ戻る</a></p>
    <section class="panel">
      <div class="row">
        <div class="col-md-4 mb-3"><label class="form-label" for="file">CSVファイル</label><input class="form-control" id="file" type="file" accept=".csv,.txt,text/csv,text/plain"></div>
        <div class="col-md-3 mb-3"><label class="form-label" for="encoding">文字コード</label><select class="form-select" id="encoding"><option value="auto">自動判定</option><option value="utf-8">UTF-8</option><option value="shift_jis">Shift_JIS</option></select></div>
        <div class="col-md-3 mb-3"><label class="form-label" for="delimiter">区切り</label><select class="form-select" id="delimiter"><option value=",">カンマ</option><option value="	">タブ</option></select></div>
      </div>
      <div class="toolbar">
        <button class="btn btn-primary" id="load">読み込み</button>
        <button class="btn btn-outline-secondary" id="addRow" disabled>行追加</button>
        <button class="btn btn-outline-secondary" id="download" disabled>CSV保存</button>
        <div style="min-width:220px"><label class="form-label" for="search">検索</label><input class="form-control" id="search" type="search" placeholder="検索文字列"></div>
      </div>
    </section>
    <div id="message" class="alert alert-info">ファイルを選択してください。Shift_JISの読み込みはブラウザ標準機能で対応します。保存は互換性を優先してUTF-8で出力します。</div>
    <section class="panel">
      <div class="mb-2 text-muted" id="summary">未読み込み</div>
      <div class="table-wrap"><table class="table table-sm" id="table"></table></div>
    </section>
  </main>
  <script src="../../assets/vendor/encoding.min.js"></script>
  <script>
    const state={rows:[],fileName:"edited.csv",delimiter:",",newline:"\r\n",encoding:"utf-8"};
    const el=id=>document.getElementById(id);
    function parseCsv(text,delimiter){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(q){if(c==='"'&&n==='"'){cell+='"';i++}else if(c==='"'){q=false}else{cell+=c}}else{if(c==='"'){q=true}else if(c===delimiter){row.push(cell);cell=""}else if(c==="\r"&&n==="\n"){row.push(cell);rows.push(row);row=[];cell="";i++}else if(c==="\n"||c==="\r"){row.push(cell);rows.push(row);row=[];cell=""}else{cell+=c}}}if(cell!==""||row.length){row.push(cell);rows.push(row)}return rows}
    function csvEscape(v,d){v=String(v??"");return v.includes('"')||v.includes("\n")||v.includes("\r")||v.includes(d)?'"'+v.replaceAll('"','""')+'"':v}
    function toCsv(){return state.rows.map(r=>r.map(v=>csvEscape(v,state.delimiter)).join(state.delimiter)).join(state.newline)+state.newline}
    function render(){const t=el("table");const max=Math.max(0,...state.rows.map(r=>r.length));const expected=state.rows[0]?.length||max;let html="<thead><tr><th>行</th><th>操作</th>";for(let c=0;c<max;c++)html+=`<th>列${c+1}</th>`;html+="</tr></thead><tbody>";const term=el("search").value;state.rows.forEach((r,ri)=>{const warn=r.length!==expected;html+=`<tr class="${warn?'row-warning':''}"><td class="mono">${ri+1}</td><td><button class="btn btn-danger" data-del="${ri}">削除</button></td>`;for(let c=0;c<max;c++){const val=r[c]??"";const hit=term&&val.includes(term);html+=`<td class="editable-cell ${hit?'hit':''}" contenteditable="true" data-r="${ri}" data-c="${c}">${escapeHtml(val)}</td>`}html+="</tr>"});html+="</tbody>";t.innerHTML=html;el("summary").textContent=`${state.rows.length}行 / 最大${max}列 / 文字コード: ${state.encoding} / 改行: ${state.newline==="\r\n"?"CRLF":"LF"}`;el("addRow").disabled=state.rows.length===0;el("download").disabled=state.rows.length===0}
    function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
    el("load").addEventListener("click",async()=>{const f=el("file").files[0];if(!f)return;const buf=await f.arrayBuffer();state.fileName=f.name.replace(/\.csv$/i,"")+"_edited.csv";state.delimiter=el("delimiter").value;const selected=el("encoding").value;state.encoding=selected==="auto"?LocalEncoding.detect(buf):selected;const text=LocalEncoding.decode(buf,state.encoding);state.newline=text.includes("\r\n")?"\r\n":"\n";state.rows=parseCsv(text,state.delimiter);el("message").className="alert alert-info";el("message").textContent=`読み込みました。列数が先頭行と異なる行は黄色で表示します。保存はUTF-8でダウンロードします。`;render()});
    el("table").addEventListener("input",e=>{const td=e.target.closest("[data-r]");if(!td)return;const r=Number(td.dataset.r),c=Number(td.dataset.c);while(state.rows[r].length<=c)state.rows[r].push("");state.rows[r][c]=td.textContent});
    el("table").addEventListener("click",e=>{const b=e.target.closest("[data-del]");if(!b)return;state.rows.splice(Number(b.dataset.del),1);render()});
    el("addRow").addEventListener("click",()=>{const cols=state.rows[0]?.length||1;state.rows.push(Array(cols).fill(""));render()});
    el("search").addEventListener("input",render);
    el("download").addEventListener("click",()=>{const bytes=LocalEncoding.encodeUtf8(toCsv(),true);const blob=new Blob([bytes],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=state.fileName;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)});
  </script>
</body>
</html>
