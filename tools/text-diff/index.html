<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>テキスト差分確認</title><link rel="stylesheet" href="../../assets/vendor/bootstrap.min.css"><link rel="stylesheet" href="../../assets/css/common.css"></head><body><header class="app-header"><div class="container"><h1>テキスト差分確認</h1><p>2つのテキストを行単位で比較します。</p></div></header><main class="container py-4"><p><a href="../../index.html">← ツール一覧へ戻る</a></p><section class="panel"><div class="row"><div class="col-md-6 mb-3"><label class="form-label">変更前</label><textarea class="form-control" id="a" rows="10"></textarea></div><div class="col-md-6 mb-3"><label class="form-label">変更後</label><textarea class="form-control" id="b" rows="10"></textarea></div></div><button class="btn btn-primary" id="run">比較</button></section><div class="table-wrap"><table class="table table-sm"><thead><tr><th>種別</th><th>内容</th></tr></thead><tbody id="out"></tbody></table></div></main><script>function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}function lcs(a,b){const dp=Array(a.length+1).fill(0).map(()=>Array(b.length+1).fill(0));for(let i=a.length-1;i>=0;i--)for(let j=b.length-1;j>=0;j--)dp[i][j]=a[i]===b[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);let i=0,j=0,res=[];while(i<a.length||j<b.length){if(i<a.length&&j<b.length&&a[i]===b[j]){res.push([" ",a[i++]]);j++}else if(j<b.length&&(i===a.length||dp[i][j+1]>=dp[i+1][j]))res.push(["+",b[j++]]);else res.push(["-",a[i++]])}return res}document.getElementById("run").onclick=()=>{const a=document.getElementById("a").value.split(/\r\n|\n|\r/),b=document.getElementById("b").value.split(/\r\n|\n|\r/);document.getElementById("out").innerHTML=lcs(a,b).map(([k,v])=>`<tr class="${k==='+'?'diff-add':k==='-'?'diff-del':'diff-same'}"><td class="mono">${k}</td><td>${esc(v)}</td></tr>`).join("")}</script></body></html>
