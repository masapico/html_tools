<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>外字・私用領域検出</title><link rel="stylesheet" href="../../assets/vendor/bootstrap.min.css"><link rel="stylesheet" href="../../assets/css/common.css"></head><body><header class="app-header"><div class="container"><h1>外字・私用領域検出</h1><p>テキストファイル内の私用領域文字を含む行を抽出します。</p></div></header><main class="container py-4"><p><a href="../../index.html">← ツール一覧へ戻る</a></p><section class="panel"><div class="row"><div class="col-md-6 mb-3"><label class="form-label" for="file">テキストファイル</label><input class="form-control" id="file" type="file"></div><div class="col-md-3 mb-3"><label class="form-label" for="enc">文字コード</label><select class="form-select" id="enc"><option value="auto">自動判定</option><option value="utf-8">UTF-8</option><option value="shift_jis">Shift_JIS</option></select></div></div><button class="btn btn-primary" id="run">検出</button></section><div id="msg" class="alert alert-info">ファイルを選択してください。</div><div class="table-wrap"><table class="table table-sm"><thead><tr><th>行</th><th>該当文字</th><th>コードポイント</th><th>内容</th></tr></thead><tbody id="out"></tbody></table></div></main><script src="../../assets/vendor/encoding.min.js"></script><script>function isPUA(cp){return(cp>=0xE000&&cp<=0xF8FF)||(cp>=0xF0000&&cp<=0xFFFFD)||(cp>=0x100000&&cp<=0x10FFFD)}function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}document.getElementById("run").onclick=async()=>{const f=document.getElementById("file").files[0];if(!f)return;const b=await f.arrayBuffer();const sel=document.getElementById("enc").value;const enc=sel==="auto"?LocalEncoding.detect(b):sel;const text=LocalEncoding.decode(b,enc);const rows=[];text.split(/\r\n|\n|\r/).forEach((line,i)=>{const hits=Array.from(line).filter(ch=>isPUA(ch.codePointAt(0)));if(hits.length)rows.push(`<tr><td>${i+1}</td><td class="mono">${hits.map(esc).join(" ")}</td><td class="mono">${hits.map(ch=>"U+"+ch.codePointAt(0).toString(16).toUpperCase()).join(" ")}</td><td>${esc(line)}</td></tr>`)});document.getElementById("out").innerHTML=rows.join("");document.getElementById("msg").textContent=rows.length?`${rows.length}行で検出しました。`:"検出なし";};</script></body></html>
