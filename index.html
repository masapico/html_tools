<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>業務用HTMLツール集</title>
  <link rel="stylesheet" href="assets/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/common.css">
</head>
<body>
  <header class="app-header">
    <div class="container">
      <h1>業務用HTMLツール集</h1>
      <p>閉域環境でも使える、ブラウザ単体動作の簡易ツールです。入力内容やファイルは外部送信しません。</p>
    </div>
  </header>
  <main class="container py-4">
    <div class="tool-grid">
      <a class="tool-card" href="tools/csv-editor/index.html">
        <span class="tool-title">CSV編集ツール</span>
        <span class="tool-desc">CSVを表で確認し、セル編集・行追加削除・検索・保存を行います。</span>
      </a>
      <a class="tool-card" href="tools/char-code/index.html">
        <span class="tool-title">文字コード確認</span>
        <span class="tool-desc">入力文字のコードポイント、UTF-16、私用領域判定を表示します。</span>
      </a>
      <a class="tool-card" href="tools/private-use-finder/index.html">
        <span class="tool-title">外字・私用領域検出</span>
        <span class="tool-desc">ファイル内の私用領域文字を含む行を抽出します。</span>
      </a>
      <a class="tool-card" href="tools/text-counter/index.html">
        <span class="tool-title">文字数・行数カウント</span>
        <span class="tool-desc">文字数、行数、空白除外、全角半角の概算を確認します。</span>
      </a>
      <a class="tool-card" href="tools/japanese-era/index.html">
        <span class="tool-title">和暦・西暦変換</span>
        <span class="tool-desc">明治以降の日付を和暦・西暦で相互変換します。</span>
      </a>
      <a class="tool-card" href="tools/text-diff/index.html">
        <span class="tool-title">テキスト差分確認</span>
        <span class="tool-desc">2つのテキストを行単位で比較します。</span>
      </a>
    </div>
  </main>
</body>
</html>
